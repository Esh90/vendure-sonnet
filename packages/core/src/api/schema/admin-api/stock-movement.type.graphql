enum StockMovementType {
    ADJUSTMENT
    ALLOCATION
    RELEASE
    SALE
    CANCELLATION
    RETURN
}

interface StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
}

type StockAdjustment implements Node & StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
}

type Allocation implements Node & StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
    orderLine: OrderLine!
}

type Sale implements Node & StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
}

type Cancellation implements Node & StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
    orderLine: OrderLine!
}

type Return implements Node & StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
}

type Release implements Node & StockMovement {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    productVariant: ProductVariant!
    type: StockMovementType!
    quantity: Int!
    partitionKey: String!
}

union StockMovementItem = StockAdjustment | Allocation | Sale | Cancellation | Return | Release

type StockMovementList {
    items: [StockMovementItem!]!
    totalItems: Int!
}
