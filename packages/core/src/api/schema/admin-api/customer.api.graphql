type Query {
    customers(options: CustomerListOptions): CustomerList!
    customer(id: ID!): Customer
}

type Mutation {
    "Create a new Customer. If a password is provided, a new User will also be created an linked to the Customer."
    createCustomer(input: CreateCustomerInput!, password: String): CreateCustomerResult!

    "Update an existing Customer"
    updateCustomer(input: UpdateCustomerInput!): UpdateCustomerResult!

    "Delete a Customer"
    deleteCustomer(id: ID!): DeletionResponse!

    "Deletes Customers"
    deleteCustomers(ids: [ID!]!): [DeletionResponse!]!

    "Create a new Address and associate it with the Customer specified by customerId"
    createCustomerAddress(customerId: ID!, input: CreateAddressInput!): Address!

    "Update an existing Address"
    updateCustomerAddress(input: UpdateAddressInput!): Address!

    "Update an existing Address"
    deleteCustomerAddress(id: ID!): Success!

    addNoteToCustomer(input: AddNoteToCustomerInput!): Customer!
    updateCustomerNote(input: UpdateCustomerNoteInput!): HistoryEntry!
    deleteCustomerNote(id: ID!): DeletionResponse!

    """
    Completes the email verification step of a registered Customer with a randomly generated
    password. Returns the generated password so the administrator can communicate it to the
    customer. Intended for situations where the customer never confirmed the verification email.
    """
    verifyCustomerAccountAsAdmin(customerId: ID!): VerifyCustomerAccountAsAdminResult!

    """
    Triggers the standard password-reset email flow for a verified Customer, on behalf of an
    administrator. Equivalent to the Customer calling `requestPasswordReset` from the Shop API:
    a reset token is issued and a `PasswordResetEvent` is published so the configured email
    handler can send the customer a reset link.
    """
    resetCustomerPasswordAsAdmin(customerId: ID!): ResetCustomerPasswordAsAdminResult!
}

input UpdateCustomerInput {
    id: ID!
    title: String
    firstName: String
    lastName: String
    phoneNumber: String
    emailAddress: String
}

input CustomerFilterParameter {
    postalCode: StringOperators
}

# generated by generateListOptions function
input CustomerListOptions

input AddNoteToCustomerInput {
    id: ID!
    note: String!
    isPublic: Boolean!
}

input UpdateCustomerNoteInput {
    noteId: ID!
    note: String!
}

union CreateCustomerResult = Customer | EmailAddressConflictError
union UpdateCustomerResult = Customer | EmailAddressConflictError

"""
Returned by `verifyCustomerAccountAsAdmin` to expose the randomly generated password to the
administrator. The cleartext password is included in the response only once and is not persisted
anywhere else; the administrator is responsible for securely transmitting it to the customer.
"""
type AdminGeneratedPassword {
    password: String!
}

"""
Returned when an administrator action requires the Customer to be in a specific account state
(e.g. trying to reset the password of a guest or registered customer, or trying to manually
verify a customer that is already verified or has no User).
"""
type CustomerAccountStateError implements ErrorResult {
    errorCode: ErrorCode!
    message: String!
    accountState: String!
}

union VerifyCustomerAccountAsAdminResult = AdminGeneratedPassword | CustomerAccountStateError
union ResetCustomerPasswordAsAdminResult = Success | CustomerAccountStateError
