name: 'Setup Vendure'
description: 'Setup Node with npm cache and install dependencies'
inputs:
    node-version:
        description: 'Node.js version'
        required: false
        default: '22.x'
    bun-version:
        description: 'Bun version (Bun is needed on PATH for Lerna/Nx task execution since bun.lock is present in the repo)'
        required: false
        default: '1.3.10'
runs:
    using: 'composite'
    steps:
        - uses: actions/setup-node@v4
          with:
              node-version: ${{ inputs.node-version }}
              cache: 'npm'
        - uses: oven-sh/setup-bun@v2
          with:
              bun-version: ${{ inputs.bun-version }}
        - name: Install dependencies
          shell: bash
          run: |
              npm install
              npm install --os=linux --cpu=x64 sharp
